name: consul
services:
  agent:
    image: ghcr.io/soramitsukhmer-lab/sorakhrun-consul-agent:latest
    container_name: agent
    restart: unless-stopped
    environment:
      CONSUL_ZEROCONFIG: "true"
    hostname: ${HOSTNAME:?The HOSTNAME environment variable must be set}
    ports:
      - "8300:8300/tcp"
      - "8301:8301/tcp"
      - "8301:8301/udp"
      - "8302:8302/tcp"
      - "8302:8302/udp"
      - "8500:8500/tcp"
      - "8501:8501/tcp"
      - "8502:8502/tcp"
      - "8503:8503/tcp"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    volumes:
      - data:/consul/data
volumes:
  data:
networks:
  default:
    driver: bridge
